# nginx reverse proxy for the Farah site.
# Replace farahali.org with your real domain before installing.
# TLS uses a Cloudflare Origin Certificate (see deploy/DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name farahali.org www.farahali.org;
    # Cloudflare talks to us over 443; send any plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name farahali.org www.farahali.org;

    ssl_certificate     /etc/ssl/cloudflare/farah.pem;
    ssl_certificate_key /etc/ssl/cloudflare/farah.key;

    # Allow image uploads (the app caps files at 8 MB; give headroom).
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
